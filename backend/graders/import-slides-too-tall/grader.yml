name: import-slides-too-tall
type: model
kind: categorical
description: >
  Detects output cards that grow past 16:9 aspect ratio, driven by font sizes, diagrams, or product limits in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
