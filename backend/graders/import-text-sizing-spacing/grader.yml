name: import-text-sizing-spacing
type: model
kind: categorical
description: >
  Detects text sizing and spacing issues — heading over/undersizing, spacing inflation, text too small, headings demoted to labels in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
