name: import-background-images-dropped
type: model
kind: categorical
description: >
  Detects full-bleed, title, or background images from the source slide that are missing in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
