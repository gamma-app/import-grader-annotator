name: import-images-oversized
type: model
kind: categorical
description: >
  Detects small inline glyphs, icons, or emoji that are blown up to disproportionately large graphics in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
