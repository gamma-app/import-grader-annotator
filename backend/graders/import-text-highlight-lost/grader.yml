name: import-text-highlight-lost
type: model
kind: categorical
description: >
  Detects decorative text highlights behind key phrases that are dropped in the Gamma output while other emphasis (bold) may survive.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
