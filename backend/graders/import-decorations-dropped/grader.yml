name: import-decorations-dropped
type: model
kind: categorical
description: >
  Detects decorative shapes (clouds, blobs, swooshes, gradient bars, grids, quarter-circles) that are dropped in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
