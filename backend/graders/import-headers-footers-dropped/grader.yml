name: import-headers-footers-dropped
type: model
kind: categorical
description: >
  Detects headers, footers, page numbers, footer text, confidentiality lines, or compliance text that are dropped in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
