name: import-labels-pills
type: model
kind: categorical
description: >
  Detects label/pill styling issues — wrong pill color, casing, or styling; pills flattened to plain text in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
