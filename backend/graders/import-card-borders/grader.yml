name: import-card-borders
type: model
kind: categorical
description: >
  Detects slide borders or frames that are dropped or changed in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
