name: import-heading-alignment
type: model
kind: categorical
description: >
  Detects heading alignment changes — top-to-center swaps, body centered instead of left-aligned, or other alignment shifts in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
