name: import-color-zones-misassigned
type: model
kind: categorical
description: >
  Detects container fills dropped or added, split-background zones lost, or outline-vs-fill swapped in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
