name: import-bullet-styling
type: model
kind: categorical
description: >
  Detects bullet shape changes (square/arrow/dash to round dots) or bullet sizing discrepancies in the Gamma output.
model: claude-sonnet-4-6
promptFile: prompt.md
imageVariables:
  - input_slide
  - output_slide
imageConfig:
  resizeImages: false
categories:
  - pass
  - borderline
  - fail
passCategories:
  - pass
